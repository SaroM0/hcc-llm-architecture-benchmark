api:
  base_url: ${OPENROUTER_BASE_URL}
  api_key: ${OPENROUTER_API_KEY}
  timeout_s: 3600
  retries: 3
  headers: {}

# =============================================================================
# MODEL DEFINITIONS
# =============================================================================
# Large models: High-capacity state-of-the-art models (upper-bound reference)
# Small models: Resource-efficient models (deployable/cost-constrained)
# =============================================================================

models:
  # --- LARGE MODELS (5) ---
  claude_opus_4_8:
    id: anthropic/claude-opus-4.8
    class: large
    defaults:
      temperature: 0.2
      max_tokens: 2048
  gpt_5_5_pro:
    id: openai/gpt-5.5-pro
    class: large
    defaults:
      temperature: 0.2
      max_tokens: 2048
  gemini_3_1_pro_preview:
    id: google/gemini-3.1-pro-preview
    class: large
    defaults:
      temperature: 0.2
      max_tokens: 2048
  qwen3_7_max:
    id: qwen/qwen3.7-max
    class: large
    defaults:
      temperature: 0.2
      max_tokens: 2048
  kimi_k2_6:
    id: moonshotai/kimi-k2.6
    class: large
    defaults:
      temperature: 0.2
      max_tokens: 2048

  # --- SMALL MODELS (5) ---
  qwen3_6_27b:
    id: qwen/qwen3.6-27b
    class: small
    defaults:
      temperature: 0.2
      max_tokens: 2048
  gpt_oss_20b:
    id: openai/gpt-oss-20b
    class: small
    defaults:
      temperature: 0.2
      max_tokens: 2048
  gemma_4_26b_a4b_it:
    id: google/gemma-4-26b-a4b-it
    class: small
    defaults:
      temperature: 0.2
      max_tokens: 2048
  qwen3_5_27b:
    id: qwen/qwen3.5-27b
    class: small
    defaults:
      temperature: 0.2
      max_tokens: 2048
  qwen3_5_9b:
    id: qwen/qwen3.5-9b
    class: small
    defaults:
      temperature: 0.2
      max_tokens: 2048

# =============================================================================
# MODEL GROUPS FOR EXPERIMENTS
# =============================================================================
groups:
  large: [claude_opus_4_8, gpt_5_5_pro, gemini_3_1_pro_preview, qwen3_7_max, kimi_k2_6]
  small: [qwen3_6_27b, gpt_oss_20b, gemma_4_26b_a4b_it, qwen3_5_27b, qwen3_5_9b]
  all: [claude_opus_4_8, gpt_5_5_pro, gemini_3_1_pro_preview, qwen3_7_max, kimi_k2_6, qwen3_6_27b, gpt_oss_20b, gemma_4_26b_a4b_it, qwen3_5_27b, qwen3_5_9b]
  a1_large: [claude_opus_4_8, gpt_5_5_pro, gemini_3_1_pro_preview, qwen3_7_max, kimi_k2_6]
  a1_small: [qwen3_6_27b, gpt_oss_20b, gemma_4_26b_a4b_it, qwen3_5_27b, qwen3_5_9b]
  a1_all: [claude_opus_4_8, gpt_5_5_pro, gemini_3_1_pro_preview, qwen3_7_max, kimi_k2_6, qwen3_6_27b, gpt_oss_20b, gemma_4_26b_a4b_it, qwen3_5_27b, qwen3_5_9b]
  # Best performing models from each class
  best_large: [claude_opus_4_8]
  best_small: [qwen3_6_27b]

# =============================================================================
# ROLE DEFAULTS
# =============================================================================
roles:
  # A1: Oneshot (no RAG)
  oneshot: qwen3_6_27b

  # A2: Multi-agent Consensus RAG for large models
  consensus_large: claude_opus_4_8

  # A3: Multi-agent Consensus RAG for small models
  consensus_small: qwen3_6_27b

  # Evaluation
  judge: claude_opus_4_8
